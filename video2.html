<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星空视频</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            overflow:hidden;
            background:#000;
        }
        video{
            width:100vw;
            height:100vh;
            object-fit:cover;
        }
    </style>
</head>

<body>
    <!-- 视频：自动播放 + 有声音 + 循环 -->
    <video id="myVideo" autoplay loop playsinline>
        <source src="vedio.mp4" type="video/mp4">
    </video>

    <script>
        // 进入页面就打开声音并播放
        const video = document.getElementById('myVideo');
        video.muted = false;   // 打开声音
        video.volume = 0.8;    // 音量80%
        video.play();
    </script>
</body>
</html>
